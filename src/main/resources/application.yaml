spring:
  application:
    name: demo
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      mode: always

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vacinacao?useTimezone=true&serverTimezone=UTC
    username: ${JDBC_USERNAME_LOCALHOST}
    password: ${JDBC_PASSWORD_LOCALHOST}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
